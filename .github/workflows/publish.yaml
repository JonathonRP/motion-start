name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # to create release (changesets/action)
  pull-requests: write # to create pull request (changesets/action)
  id-token: write # for npm OIDC trusted publishing (no token required)

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Configures .npmrc for OIDC token exchange with the npm registry.
      # No NPM_TOKEN or NODE_AUTH_TOKEN required — npm exchanges the GitHub
      # OIDC JWT for a short-lived publish token automatically at publish time.
      #
      # One-time setup on npmjs.com:
      #   Package Settings → Trusted Publishers → GitHub Actions
      #   Set the org/user, repo, and this workflow filename.
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      # npm >=11.5.1 (or Node >=24) is required for OIDC token exchange.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: bun --bun install --frozen-lockfile

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun --bun release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          # NODE_AUTH_TOKEN must remain unset — npm falls back to OIDC only
          # when it is completely absent from the environment.
