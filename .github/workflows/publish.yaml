name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # to create release (changesets/action)
  pull-requests: write # to create pull request (changesets/action)
  id-token: write # to sign packages with npm provenance

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun --bun install --frozen-lockfile

      # Mint an ephemeral automation token using the npm CLI.
      # NPM_PUBLISH_TOKEN is a never-expiring automation token stored once as a
      # repo secret; it is never used to publish directly — only to create and
      # revoke ephemeral tokens, so its blast radius is minimal.
      - name: Create ephemeral npm publish token
        id: npm-token
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NPM_PUBLISH_TOKEN}"
          RESPONSE=$(npm token create --automation --json)

          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          KEY=$(echo "$RESPONSE"   | jq -r '.key   // empty')

          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to create npm token. Response: $RESPONSE"
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "key=$KEY"     >> "$GITHUB_OUTPUT"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun --bun release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ steps.npm-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: true

      # Always revoke the ephemeral token after use (even if publishing failed).
      - name: Revoke ephemeral npm publish token
        if: always() && steps.npm-token.outputs.key != ''
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NPM_PUBLISH_TOKEN}"
          npm token revoke "${{ steps.npm-token.outputs.key }}" || true
