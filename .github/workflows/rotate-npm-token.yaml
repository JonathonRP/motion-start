name: Rotate npm Token

# Runs every 60 days so the active NPM_TOKEN (90-day granular token) is always
# refreshed well before it expires. Also triggerable manually at any time.
#
# Required secrets (one-time manual setup):
#   NPM_PUBLISH_TOKEN  – a never-expiring npm *automation* token used only to
#                        mint new tokens; keep it offline / out of publish flows.
#   GH_PAT             – a GitHub PAT with the `secrets:write` scope on this
#                        repo, used to update the NPM_TOKEN secret automatically.

on:
  schedule:
    - cron: '0 0 1 */2 *' # 1st of every other month (~every 60 days)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    name: Refresh NPM_TOKEN
    runs-on: ubuntu-latest
    steps:
      - name: Create new npm granular access token
        id: create-token
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          # Authenticate with the long-lived bootstrap token (automation type,
          # no expiry) to create a new short-lived granular token. Automation
          # tokens bypass 2FA for registry API calls.
          RESPONSE=$(curl -fsSL -X POST \
            -H "Authorization: Bearer ${NPM_PUBLISH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "granular-access-token",
              "expiration": 7776000,
              "allowedPackages": [
                { "name": "motion-start", "scope": "", "permission": "read-write" }
              ],
              "allowedOrgs": [],
              "cidrRanges": []
            }' \
            https://registry.npmjs.org/-/npm/v1/tokens/granular 2>&1) || true

          NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')

          # Fallback: if granular endpoint is unavailable, create a scoped
          # automation token instead (also bypasses 2FA, can be published with).
          if [ -z "$NEW_TOKEN" ]; then
            RESPONSE=$(curl -fsSL -X POST \
              -H "Authorization: Bearer ${NPM_PUBLISH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"readonly": false, "automation": true}' \
              https://registry.npmjs.org/-/npm/v1/tokens 2>&1)
            NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          fi

          if [ -z "$NEW_TOKEN" ]; then
            echo "::error::Failed to create new npm token. Response: $RESPONSE"
            exit 1
          fi

          echo "::add-mask::$NEW_TOKEN"
          echo "token=$NEW_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Update NPM_TOKEN repository secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set NPM_TOKEN \
            --body "${{ steps.create-token.outputs.token }}" \
            --repo "${{ github.repository }}"
          echo "NPM_TOKEN rotated successfully on $(date -u +%Y-%m-%d)"
